version: '3.8'

services:
  # PostgreSQL + TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: swarm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: swarm_user
      POSTGRES_PASSWORD: swarm_password_2026
      POSTGRES_DB: swarm_trader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/storage/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - swarm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm_user -d swarm_trader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse (Optional - for high-frequency orderbook data)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: swarm_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: swarm_user
      CLICKHOUSE_PASSWORD: swarm_password_2026
      CLICKHOUSE_DB: swarm_orderbook
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - swarm_network
    depends_on:
      - postgres
    profiles:
      - full  # Only start with --profile full

  # Redis (Optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: swarm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - swarm_network
    profiles:
      - full

  # Adminer (Database GUI - Optional)
  adminer:
    image: adminer:latest
    container_name: swarm_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - swarm_network
    depends_on:
      - postgres
    profiles:
      - gui  # Only start with --profile gui

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  redis_data:
    driver: local

networks:
  swarm_network:
    driver: bridge
